name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Uses a self-hosted runner (consistent with the cboxdk packages). Switch to
    # ubuntu-latest if GitHub-hosted minutes are available for this repo.
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sodium, openssl, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Install Playwright browser (for Pest 4 browser tests)
        run: npx playwright install --with-deps chromium

      - name: Prepare environment
        run: |
          cp .env.example .env || true
          php artisan key:generate --force

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan/Larastan)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Tests (Pest — feature, axe-core a11y, and real-browser smoke)
        run: vendor/bin/pest
